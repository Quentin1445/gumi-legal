<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gumi — Informations légales</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Text', 'Helvetica Neue', sans-serif;
            background-color: #FAFAF8;
            color: #1A1B4B;
            line-height: 1.6;
        }
        .container {
            max-width: 600px;
            margin: 0 auto;
            padding: 40px 20px;
            text-align: center;
        }
        .logo {
            font-size: 48px;
            margin-bottom: 8px;
        }
        h1 {
            font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Rounded', 'Helvetica Neue', sans-serif;
            font-size: 28px;
            color: #FF8C42;
            margin-bottom: 8px;
        }
        .subtitle {
            font-size: 16px;
            color: #666;
            margin-bottom: 40px;
        }
        .links {
            display: flex;
            flex-direction: column;
            gap: 16px;
            margin-bottom: 40px;
        }
        .links a {
            display: block;
            padding: 20px;
            background: white;
            border-radius: 16px;
            text-decoration: none;
            color: #1A1B4B;
            font-size: 18px;
            font-weight: 600;
            box-shadow: 0 2px 8px rgba(0,0,0,0.06);
            transition: transform 0.2s, box-shadow 0.2s;
        }
        .links a:hover {
            transform: translateY(-2px);
            box-shadow: 0 4px 16px rgba(0,0,0,0.1);
        }
        .links a span {
            display: block;
            font-size: 14px;
            font-weight: 400;
            color: #666;
            margin-top: 4px;
        }
        .contact {
            font-size: 14px;
            color: #999;
        }
        .contact a {
            color: #FF8C42;
            text-decoration: none;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="logo">🐾</div>
        <h1>Gumi</h1>
        <p class="subtitle">Coach IA pour ton chien</p>

        <div class="links">
            <a href="privacy-policy.html">
                🔒 Politique de confidentialité
                <span>Comment nous protégeons tes données</span>
            </a>
            <a href="terms.html">
                📄 Conditions Générales d'Utilisation
                <span>Règles d'utilisation du service</span>
            </a>
        </div>

        <p class="contact">
            Contact : <a href="mailto:support@gumi-app.com">support@gumi-app.com</a><br>
            © 2026 Quentin Beaudouin — Tous droits réservés
        </p>
    </div>
</body>
</html>
